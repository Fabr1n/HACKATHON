<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questionário - Plataforma para Mulheres Empreendedoras</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
        }
        header {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .progress {
            height: 100%;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            transition: width 0.3s ease;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #ff6b6b;
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.2);
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        .btn {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            margin: 10px 5px 10px 0;
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
        }
        .btn-secondary {
            background: #666;
        }
        .btn-secondary:hover {
            background: #555;
        }
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        .error {
            color: #d32f2f;
            background: #ffebee;
        }
        .success {
            color: #388e3c;
            background: #e8f5e9;
        }
    </style>
</head>
<body>
    <header>
        <h1><i class="fas fa-clipboard-list"></i> Questionário Inicial</h1>
        <p>Ajude-nos a entender melhor seu perfil e necessidades</p>
    </header>
    <div class="container">
        <div class="card">
            <div class="progress-bar">
                <div class="progress" id="progress" style="width: 10%;"></div>
            </div>
            <div class="error" id="error"></div>
            <div class="success" id="success"></div>
            <form id="questionnaireForm">
                <div class="form-group">
                    <label for="name"><i class="fas fa-user"></i> Nome completo:</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label for="age"><i class="fas fa-birthday-cake"></i> Idade:</label>
                    <input type="number" id="age" min="18" max="100" required>
                </div>
                <div class="form-group">
                    <label for="location"><i class="fas fa-map-marker-alt"></i> Localização:</label>
                    <input type="text" id="location" placeholder="Cidade, Estado">
                </div>
                <div class="form-group">
                    <label for="education"><i class="fas fa-graduation-cap"></i> Nível de escolaridade:</label>
                    <select id="education" required>
                        <option value="">Selecione</option>
                        <option value="fundamental">Ensino Fundamental</option>
                        <option value="medio">Ensino Médio</option>
                        <option value="superior">Ensino Superior</option>
                        <option value="pos">Pós-graduação</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="experience"><i class="fas fa-briefcase"></i> Descreva sua experiência empreendedora:</label>
                    <textarea id="experience" required></textarea>
                </div>
                <div class="form-group">
                    <label for="challenges"><i class="fas fa-exclamation-triangle"></i> Principais desafios enfrentados:</label>
                    <textarea id="challenges" required></textarea>
                </div>
                <div class="form-group">
                    <label for="goals"><i class="fas fa-bullseye"></i> Objetivos para os próximos 3 anos:</label>
                    <textarea id="goals" required></textarea>
                </div>
                <div class="form-group">
                    <label for="support"><i class="fas fa-hands-helping"></i> Que tipo de apoio você precisa?</label>
                    <textarea id="support" required></textarea>
                </div>
                <div class="form-group">
                    <label for="industry"><i class="fas fa-industry"></i> Segmento/Indústria:</label>
                    <input type="text" id="industry" placeholder="ex: Tecnologia, Moda, Alimentos">
                </div>
                <button type="submit" class="btn"><i class="fas fa-paper-plane"></i> Enviar Questionário</button>
                <button type="button" class="btn btn-secondary" onclick="window.location.href='/'"><i class="fas fa-arrow-left"></i> Voltar</button>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('questionnaireForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const data = {
                name: document.getElementById('name').value,
                age: document.getElementById('age').value,
                location: document.getElementById('location').value,
                education: document.getElementById('education').value,
                experience: document.getElementById('experience').value,
                challenges: document.getElementById('challenges').value,
                goals: document.getElementById('goals').value,
                support: document.getElementById('support').value,
                industry: document.getElementById('industry').value
            };
            
            const errorDiv = document.getElementById('error');
            const successDiv = document.getElementById('success');
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            try {
                const response = await fetch('/questionnaire', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                
                if (result.success) {
                    successDiv.textContent = result.message;
                    successDiv.style.display = 'block';
                    form.reset();
                    setTimeout(() => window.location.href = '/', 2000);
                } else {
                    errorDiv.textContent = result.message;
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Erro ao conectar ao servidor';
                errorDiv.style.display = 'block';
            }
        });
        
        // Update progress bar
        const form = document.getElementById('questionnaireForm');
        form.addEventListener('input', () => {
            const inputs = form.querySelectorAll('input[required], textarea[required], select[required]');
            const filled = Array.from(inputs).filter(input => input.value.trim() !== '').length;
            const progress = (filled / inputs.length) * 100;
            document.getElementById('progress').style.width = progress + '%';
        });
    </script>
</body>
</html>
