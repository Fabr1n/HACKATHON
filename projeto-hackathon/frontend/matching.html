<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matching Inteligente - Plataforma Mulheres Empreendedoras</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .header h1 { color: #667eea; margin-bottom: 10px; }
        .header p { color: #666; }
        
        .filters {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .filter-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        
        .filter-group select,
        .filter-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: 'Roboto', sans-serif;
        }
        
        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .match-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s;
            position: relative;
        }
        
        .match-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }
        
        .match-score {
            position: absolute;
            top: 10px;
            right: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9em;
            z-index: 10;
        }
        
        .match-score.high { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .match-score.medium { background: linear-gradient(135deg, #ff9a56 0%, #ff6a88 100%); }
        .match-score.low { background: linear-gradient(135deg, #f83600 0%, #fe8c00 100%); }
        
        .match-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .match-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: white;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
        }
        
        .match-company-name {
            font-size: 1.2em;
            font-weight: 700;
            margin: 10px 0;
        }
        
        .match-type {
            background: rgba(255,255,255,0.2);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            margin-top: 5px;
        }
        
        .match-body {
            padding: 20px;
        }
        
        .match-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 0.9em;
        }
        
        .match-info-item {
            flex: 1;
            text-align: center;
        }
        
        .match-info-label {
            color: #999;
            font-size: 0.8em;
            margin-bottom: 3px;
        }
        
        .match-info-value {
            font-weight: 600;
            color: #333;
        }
        
        .match-description {
            color: #666;
            font-size: 0.9em;
            line-height: 1.5;
            margin-bottom: 15px;
            max-height: 80px;
            overflow-y: auto;
        }
        
        .compatibility-bar {
            margin: 15px 0;
        }
        
        .compatibility-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            margin-bottom: 5px;
            color: #333;
        }
        
        .bar {
            height: 8px;
            background: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            transition: width 0.3s;
        }
        
        .match-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 15px;
        }
        
        .tag {
            background: #f0f0f0;
            color: #667eea;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.75em;
            font-weight: 600;
        }
        
        .match-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 0.9em;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #667eea;
            border: 2px solid #667eea;
        }
        
        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active { display: flex; }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            font-size: 1.5em;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: #999;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: white;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .stat-number {
            font-size: 1.8em;
            font-weight: 700;
            color: #667eea;
        }
        
        .stat-label {
            color: #999;
            font-size: 0.85em;
            margin-top: 5px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 10px;
            color: #999;
        }
        
        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 15px;
            color: #ddd;
        }
        
        @media (max-width: 768px) {
            .filters {
                grid-template-columns: 1fr;
            }
            .matches-grid {
                grid-template-columns: 1fr;
            }
            .match-info {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-heart"></i> Matching Inteligente</h1>
            <p>Encontre parceiros compatíveis com sua empresa usando IA avançada</p>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalMatches">0</div>
                <div class="stat-label"><i class="fas fa-link"></i> Matches</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="avgScore">0%</div>
                <div class="stat-label"><i class="fas fa-chart-pie"></i> Score Médio</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="topMatch">--</div>
                <div class="stat-label"><i class="fas fa-trophy"></i> Melhor Match</div>
            </div>
        </div>
        
        <div class="filters">
            <div class="filter-group">
                <label for="typeFilter">Tipo de Empresa</label>
                <select id="typeFilter" onchange="filterMatches()">
                    <option value="">Todos os tipos</option>
                    <option value="tech">Tech</option>
                    <option value="fashion">Fashion</option>
                    <option value="food">Food</option>
                    <option value="beauty">Beauty</option>
                    <option value="consulting">Consulting</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label for="stageFilter">Estágio</label>
                <select id="stageFilter" onchange="filterMatches()">
                    <option value="">Todos os estágios</option>
                    <option value="idea">Ideia</option>
                    <option value="pre-launch">Pré-Lançamento</option>
                    <option value="launched">Lançada</option>
                    <option value="growing">Crescimento</option>
                    <option value="established">Estabelecida</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label for="scoreFilter">Score Mínimo</label>
                <select id="scoreFilter" onchange="filterMatches()">
                    <option value="0">Qualquer score</option>
                    <option value="50">50+</option>
                    <option value="60">60+</option>
                    <option value="70">70+</option>
                    <option value="80">80+</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label for="locationFilter">Localização</label>
                <input type="text" id="locationFilter" placeholder="Filtrar por cidade" onchange="filterMatches()">
            </div>
        </div>
        
        <div id="matchesContainer" class="matches-grid">
            <div class="loading">
                <div class="spinner"></div>
                <p>Calculando matches inteligentes...</p>
            </div>
        </div>
    </div>
    
    <!-- Modal - Detalhes do Match -->
    <div class="modal" id="matchDetailModal">
        <div class="modal-content">
            <div class="modal-header">
                <span><i class="fas fa-heart"></i> Detalhes do Match</span>
                <button class="close-btn" onclick="closeMatchDetail()">&times;</button>
            </div>
            
            <div id="matchDetailContent"></div>
            
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-primary" onclick="sendMatchRequest()">
                    <i class="fas fa-handshake"></i> Enviar Proposta
                </button>
                <button class="btn btn-secondary" onclick="closeMatchDetail()">
                    <i class="fas fa-times"></i> Fechar
                </button>
            </div>
        </div>
    </div>
    
    <script>
        let token = localStorage.getItem('token');
        let userEmail = localStorage.getItem('userEmail');
        let allMatches = [];
        let selectedMatch = null;
        
        if (!token) {
            window.location.href = '/login';
        }
        
        // Carregar matches ao abrir a página
        window.addEventListener('load', () => {
            loadMatches();
        });
        
        function loadMatches() {
            fetch('/api/matches', {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(res => res.json())
            .then(matches => {
                allMatches = matches;
                displayMatches(matches);
                updateStats(matches);
            })
            .catch(err => {
                console.error('Erro ao carregar matches:', err);
                document.getElementById('matchesContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon"><i class="fas fa-inbox"></i></div>
                        <p>Registre uma empresa primeiro para ver matches compatíveis.</p>
                    </div>
                `;
            });
        }
        
        function displayMatches(matches) {
            const container = document.getElementById('matchesContainer');
            
            if (matches.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon"><i class="fas fa-inbox"></i></div>
                        <p>Nenhum match encontrado com os filtros aplicados.</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = matches.map(match => `
                <div class="match-card">
                    <div class="match-score ${getScoreClass(match.matchScore)}">
                        ${match.matchScore}%
                    </div>
                    
                    <div class="match-header">
                        <div class="match-avatar">${getAvatarEmoji(match.type)}</div>
                        <div class="match-company-name">${escapeHtml(match.name)}</div>
                        <span class="match-type">${escapeHtml(match.type)}</span>
                    </div>
                    
                    <div class="match-body">
                        <div class="match-info">
                            <div class="match-info-item">
                                <div class="match-info-label">Estágio</div>
                                <div class="match-info-value">${escapeHtml(match.stage)}</div>
                            </div>
                            <div class="match-info-item">
                                <div class="match-info-label">Funcionários</div>
                                <div class="match-info-value">${match.employees || 0}</div>
                            </div>
                            <div class="match-info-item">
                                <div class="match-info-label">Receita</div>
                                <div class="match-info-value">R\$ ${formatCurrency(match.revenue)}</div>
                            </div>
                        </div>
                        
                        <div class="compatibility-bar">
                            <div class="compatibility-label">
                                <span>Compatibilidade</span>
                                <span>${match.matchScore}%</span>
                            </div>
                            <div class="bar">
                                <div class="bar-fill" style="width: ${match.matchScore}%"></div>
                            </div>
                        </div>
                        
                        <div class="match-description">${escapeHtml(match.description || 'Sem descrição disponível')}</div>
                        
                        <div class="match-tags">
                            <span class="tag">👩‍💼 ${escapeHtml(match.type)}</span>
                            <span class="tag">📈 ${escapeHtml(match.stage)}</span>
                            <span class="tag">📍 ${escapeHtml(match.location || 'Online')}</span>
                        </div>
                        
                        <div class="match-actions">
                            <button class="btn btn-primary" onclick="showMatchDetail(${JSON.stringify(match).replace(/"/g, '&quot;')})">
                                <i class="fas fa-eye"></i> Ver Detalhes
                            </button>
                            <button class="btn btn-secondary" onclick="sendMatchRequest()">
                                <i class="fas fa-envelope"></i> Contato
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function filterMatches() {
            const typeFilter = document.getElementById('typeFilter').value;
            const stageFilter = document.getElementById('stageFilter').value;
            const scoreFilter = parseInt(document.getElementById('scoreFilter').value) || 0;
            const locationFilter = document.getElementById('locationFilter').value.toLowerCase();
            
            const filtered = allMatches.filter(match => {
                return (
                    (typeFilter === '' || match.type === typeFilter) &&
                    (stageFilter === '' || match.stage === stageFilter) &&
                    (match.matchScore >= scoreFilter) &&
                    (locationFilter === '' || (match.location && match.location.toLowerCase().includes(locationFilter)))
                );
            });
            
            displayMatches(filtered);
        }
        
        function updateStats(matches) {
            document.getElementById('totalMatches').textContent = matches.length;
            
            if (matches.length > 0) {
                const avgScore = Math.round(matches.reduce((a, b) => a + b.matchScore, 0) / matches.length);
                document.getElementById('avgScore').textContent = avgScore + '%';
                
                const topMatch = matches[0];
                document.getElementById('topMatch').textContent = escapeHtml(topMatch.name.substring(0, 10));
            }
        }
        
        function showMatchDetail(match) {
            selectedMatch = match;
            const content = document.getElementById('matchDetailContent');
            
            content.innerHTML = `
                <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
                    <h2 style="margin-bottom: 10px;">${escapeHtml(match.name)}</h2>
                    <p style="opacity: 0.9;">${escapeHtml(match.description)}</p>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                    <div>
                        <h4 style="color: #333; margin-bottom: 10px;">Informações</h4>
                        <p><strong>Tipo:</strong> ${escapeHtml(match.type)}</p>
                        <p><strong>Estágio:</strong> ${escapeHtml(match.stage)}</p>
                        <p><strong>Localização:</strong> ${escapeHtml(match.location || 'Não informado')}</p>
                    </div>
                    <div>
                        <h4 style="color: #333; margin-bottom: 10px;">Dados Operacionais</h4>
                        <p><strong>Funcionários:</strong> ${match.employees || 0}</p>
                        <p><strong>Receita:</strong> R\$ ${formatCurrency(match.revenue)}</p>
                        <p><strong>CNPJ:</strong> ${escapeHtml(match.cnpj || 'Não informado')}</p>
                    </div>
                </div>
                
                <div style="background: #f9f9f9; padding: 15px; border-radius: 8px;">
                    <h4 style="color: #333; margin-bottom: 10px;">Score de Compatibilidade</h4>
                    <div class="compatibility-bar">
                        <div class="compatibility-label">
                            <span>Compatibilidade Total</span>
                            <span style="color: #667eea; font-weight: 700;">${match.matchScore}%</span>
                        </div>
                        <div class="bar">
                            <div class="bar-fill" style="width: ${match.matchScore}%"></div>
                        </div>
                    </div>
                    <p style="color: #999; font-size: 0.9em; margin-top: 10px;">
                        Este score é calculado por IA considerando tipo de negócio, estágio, tamanho, receita e localização.
                    </p>
                </div>
            `;
            
            document.getElementById('matchDetailModal').classList.add('active');
        }
        
        function closeMatchDetail() {
            document.getElementById('matchDetailModal').classList.remove('active');
            selectedMatch = null;
        }
        
        function sendMatchRequest() {
            if (!selectedMatch) return;
            
            fetch('/api/matches/request', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ targetCompanyId: selectedMatch.id })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('Solicitação de parceria enviada com sucesso!');
                    closeMatchDetail();
                }
            })
            .catch(err => console.error('Erro:', err));
        }
        
        // Helpers
        function getScoreClass(score) {
            if (score >= 80) return 'high';
            if (score >= 60) return 'medium';
            return 'low';
        }
        
        function getAvatarEmoji(type) {
            const emojis = {
                tech: '💻',
                fashion: '👗',
                food: '🍽️',
                beauty: '💄',
                consulting: '💼'
            };
            return emojis[type] || '🏢';
        }
        
        function formatCurrency(value) {
            if (!value) return '0';
            return value.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
