<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Plataforma para Mulheres Empreendedoras</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
        }
        header {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .btn {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1em;
            margin: 10px;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        form {
            max-width: 500px;
            margin: 0 auto;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <header>
        <h1><i class="fas fa-envelope"></i> Contato</h1>
    </header>
    <div class="container">
        <div class="card">
            <h2>Entre em Contato</h2>
            <p>Estamos aqui para ajudar! Envie suas dúvidas, sugestões ou feedback.</p>
            <form>
                <div class="form-group">
                    <label for="name"><i class="fas fa-user"></i> Nome:</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email:</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="message"><i class="fas fa-comment"></i> Mensagem:</label>
                    <textarea id="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn"><i class="fas fa-paper-plane"></i> Enviar</button>
            </form>
        </div>
        <div class="card">
            <h2>Informações de Contato</h2>
            <p><i class="fas fa-phone"></i> Telefone: (11) 1234-5678</p>
            <p><i class="fas fa-envelope"></i> Email: contato@mulheresempreendedoras.com</p>
            <p><i class="fas fa-map-marker-alt"></i> Endereço: São Paulo, Brasil</p>
        </div>
        <button class="btn" onclick="window.location.href='/'"><i class="fas fa-home"></i> Voltar ao Início</button>
    </div>
</body>
</html>
