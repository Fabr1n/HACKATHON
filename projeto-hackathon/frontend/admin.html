<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Plataforma para Mulheres Empreendedoras</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
        }
        header {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .btn {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1em;
            margin: 10px;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <header>
        <h1><i class="fas fa-user-shield"></i> Painel Administrativo</h1>
    </header>
    <div class="container">
        <div class="card">
            <h2>Questionários Enviados</h2>
            <table id="questionnaires-table">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Idade</th>
                        <th>Escolaridade</th>
                        <th>Experiência</th>
                        <th>Desafios</th>
                        <th>Objetivos</th>
                        <th>Apoio</th>
                        <th>Data</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Data will be loaded here -->
                </tbody>
            </table>
            <button class="btn" onclick="loadQuestionnaires()"><i class="fas fa-sync"></i> Atualizar</button>
            <button class="btn" onclick="window.location.href='/dashboard'"><i class="fas fa-arrow-left"></i> Voltar ao Dashboard</button>
        </div>
    </div>
    <script>
        async function loadQuestionnaires() {
            const token = localStorage.getItem('token');
            const response = await fetch('/api/questionnaires', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            const tbody = document.querySelector('#questionnaires-table tbody');
            tbody.innerHTML = '';
            data.forEach(q => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${q.name}</td>
                    <td>${q.age}</td>
                    <td>${q.education}</td>
                    <td>${q.experience}</td>
                    <td>${q.challenges}</td>
                    <td>${q.goals}</td>
                    <td>${q.support}</td>
                    <td>${q.submittedAt}</td>
                `;
                tbody.appendChild(row);
            });
        }
        loadQuestionnaires();
    </script>
</body>
</html>
